services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ATS_POSTGRES_DB:-agentthespire}
      POSTGRES_USER: ${ATS_POSTGRES_USER:-agentthespire}
      POSTGRES_PASSWORD: ${ATS_POSTGRES_PASSWORD:-agentthespire}
    ports:
      - "${ATS_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ats_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ATS_APP_PORT:-7860}:7860"
    volumes:
      - ./runtime/config.json:/app/config.json:ro

volumes:
  ats_postgres_data:
