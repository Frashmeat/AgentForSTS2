services:
  workstation:
    build:
      context: ./services/workstation
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ATS_WORKSTATION_PORT:-7860}:7860"
    volumes:
      - ./runtime/workstation.config.json:/app/config.json

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ATS_FRONTEND_PORT:-8080}:80"
    volumes:
      - ./runtime/runtime-config.js:/usr/share/nginx/html/runtime-config.js:ro
